# 프론트엔드 이미지를 build-arg와 함께 빌드/푸시한다.
# gcloud run deploy --source 는 --build-arg 를 지원하지 않으므로 Cloud Build를 사용한다.
#
# 사용: (deploy/deploy_frontend.sh 가 대신 호출한다)
#   gcloud builds submit frontend \
#     --config=frontend/cloudbuild.yaml \
#     --substitutions=_IMAGE=<image>,_VITE_API_KEY=<key>,_VITE_API_BASE_URL=/api
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - VITE_API_BASE_URL=${_VITE_API_BASE_URL}
      - --build-arg
      - VITE_API_KEY=${_VITE_API_KEY}
      - -t
      - ${_IMAGE}
      - .
images:
  - ${_IMAGE}
substitutions:
  _VITE_API_BASE_URL: /api
  _VITE_API_KEY: ""
options:
  logging: CLOUD_LOGGING_ONLY
