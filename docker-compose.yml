services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-excel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-excel_password}
      POSTGRES_DB: ${DB_NAME:-excel_onboarding}
    ports:
      - "5432:5432"
    
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    environment:
      DB_USER: ${DB_USER:-park}
      DB_PASSWORD: ${DB_PASSWORD:-excel_password}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-excel_onboarding}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      EXCEL_STORAGE_DIR: /data/excel
      PORT: 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - excel_files:/data/excel
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
      args:
        VITE_API_BASE_URL: /api
    environment:
      PORT: 8080
      BACKEND_UPSTREAM: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      - backend

volumes:
  db_data:
  excel_files:
